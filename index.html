<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storage War — A FilPunks Survival Game</title>
  <link rel="icon" type="image/png" href="205.png">
  <script>
    // 将 favicon 裁剪为圆形
    const img = new Image();
    img.onload = () => {
      const size = 64;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, 0, 0, size, size);
      const link = document.querySelector('link[rel="icon"]');
      link.href = c.toDataURL('image/png');
    };
    img.src = '205.png';
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    #game-container {
      position: relative;
      width: 1024px;
      height: 768px;
    }

    #game-canvas {
      display: block;
      border: 2px solid #1a1a3a;
      image-rendering: auto;
    }

    /* 移动端提示页 */
    #mobile-notice {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050510;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      text-align: center;
      padding: 20px;
    }

    #mobile-notice .notice-icon {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 3px solid #2080f0;
    }

    #mobile-notice .notice-title {
      color: #2080f0;
      font-family: monospace;
      font-size: clamp(40px, 10vw, 72px);
      font-weight: bold;
      text-shadow:
        3px 3px 0 #0c2950,
        6px 6px 0 #103b70,
        9px 9px 0 #144c90,
        12px 12px 0 #185db0,
        15px 15px 0 #1c6ed0;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    #mobile-notice .notice-subtitle {
      color: #6a9fd8;
      font-family: monospace;
      font-size: clamp(14px, 3vw, 20px);
      font-weight: bold;
      text-shadow:
        2px 2px 0 #0e3260,
        4px 4px 0 #144c90,
        6px 6px 0 #1a66c0;
      margin-bottom: 32px;
    }

    #mobile-notice .notice-message {
      color: #dfe6e9;
      font-family: monospace;
      font-size: clamp(15px, 3vw, 20px);
      font-weight: bold;
      margin-bottom: 8px;
    }

    #mobile-notice .notice-hint {
      color: #888;
      font-family: monospace;
      font-size: clamp(11px, 2vw, 14px);
    }

    /* 移动端时显示提示，隐藏游戏 */
    body.is-mobile #game-container {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
    }

    body.is-mobile #game-canvas,
    body.is-mobile #menu-btn,
    body.is-mobile #menu-popup,
    body.is-mobile #wallet-btn,
    body.is-mobile #donate-area,
    body.is-mobile #upgrade-overlay {
      display: none !important;
    }

    body.is-mobile #mobile-notice {
      display: flex;
    }

    body.is-mobile #game-container {
      width: 100vw;
      height: 100vh;
    }

    /* 升级弹窗浮层 */
    #upgrade-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #upgrade-overlay.active {
      display: flex;
    }

    #upgrade-title {
      color: #ffd700;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    #upgrade-choices {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .upgrade-card {
      width: 240px;
      padding: 20px 16px;
      background: #1a1a3a;
      border: 2px solid #3a3a6a;
      border-radius: 10px;
      color: #dfe6e9;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .upgrade-card:hover {
      transform: translateY(-4px);
      border-color: #ffd700;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
    }

    .upgrade-card .name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .upgrade-card .desc {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 10px;
    }

    .upgrade-card .card-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      color: #fff;
      margin-bottom: 8px;
    }

    .upgrade-card .evolve {
      font-size: 12px;
      color: #ffd700;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .upgrade-card .evolve small {
      color: #a09060;
    }

    .new-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #ff6348;
      color: #fff;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 4px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .lv-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #636e72;
      color: #dfe6e9;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .upgrade-card .level {
      font-size: 12px;
      color: #6c5ce7;
    }

    .upgrade-card .rarity-common { color: #dfe6e9; }
    .upgrade-card .rarity-rare { color: #74b9ff; }
    .upgrade-card .rarity-epic { color: #a29bfe; }
    .upgrade-card .rarity-legendary { color: #ffd700; }

    /* 菜单按钮 "···" */
    #menu-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 28px;
      padding: 3px 10px;
      background: #2080f0;
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      border: 2px solid #1050a0;
      border-bottom: 4px solid #1050a0;
      cursor: pointer;
      image-rendering: pixelated;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #1050a0;
      user-select: none;
      transition: transform 0.1s;
      box-sizing: content-box;
    }
    #menu-btn:hover {
      background: #3090ff;
      transform: scale(1.05);
    }
    #menu-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }
    #menu-popup {
      display: none;
      position: absolute;
      top: 48px;
      right: 16px;
      z-index: 30;
      background: #1a1a3a;
      border: 2px solid #3a3a6a;
      border-radius: 4px;
      padding: 4px;
      min-width: 120px;
    }
    #menu-popup.open {
      display: block;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      color: #dfe6e9;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      user-select: none;
    }
    .menu-item:hover {
      background: #2a2a5a;
    }
    .menu-item .label {
      margin-right: 12px;
    }
    .menu-item .val {
      color: #74b9ff;
    }
    #wallet-btn {
      position: absolute;
      top: 16px;
      right: 93px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 28px;
      padding: 3px 10px;
      background: #2d3436;
      color: #dfe6e9;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      border: 2px solid #636e72;
      border-bottom: 4px solid #636e72;
      cursor: pointer;
      image-rendering: pixelated;
      letter-spacing: 0.5px;
      text-shadow: 1px 1px 0 #222;
      user-select: none;
      transition: transform 0.1s, background 0.1s;
      box-sizing: content-box;
      white-space: nowrap;
    }
    #wallet-btn:hover {
      background: #636e72;
      transform: scale(1.05);
    }
    #wallet-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }
    #wallet-btn.connected {
      background: #0984e3;
      border-color: #0652DD;
      border-bottom-color: #0652DD;
    }
    #donate-area {
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      white-space: nowrap;
    }
    #donate-text {
      color: #555;
      font-family: monospace;
      font-size: 11px;
    }
    #copy-btn {
      display: inline;
      padding: 0 4px;
      background: none;
      color: #888;
      font-family: monospace;
      font-size: 14px;
      border: none;
      cursor: pointer;
      user-select: none;
      vertical-align: baseline;
    }
    #copy-btn:hover {
      color: #2080f0;
    }
    #copy-btn.copied {
      color: #27ae60;
    }
    #menu-mint-overlay {
      display: none;
      position: absolute;
      top: 516px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      color: #dfe6e9;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
      white-space: nowrap;
      pointer-events: auto;
    }
    #menu-mint-overlay.visible {
      display: block;
    }
    #menu-mint-overlay a {
      color: #ffd700;
      text-decoration: underline;
      cursor: pointer;
    }
    #menu-mint-overlay a:hover {
      color: #ffeaa7;
    }
    #version-label {
      position: absolute;
      bottom: 2px;
      right: 6px;
      z-index: 20;
      color: #555;
      font-family: monospace;
      font-size: 11px;
      user-select: none;
    }
    #toast {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      color: #ffd700;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
    }
    #toast.loading {
      animation: toast-pulse 1.2s ease-in-out infinite;
    }
    @keyframes toast-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="mobile-notice">
      <img class="notice-icon" src="205.png" alt="logo" />
      <div class="notice-title">STORAGE WAR</div>
      <div class="notice-subtitle">A FilPunks Survival Game</div>
      <div class="notice-message"></div>
      <div class="notice-hint"></div>
    </div>

    <!-- 立即根据浏览器语言设置移动端提示文字，避免闪烁 -->
    <script>
      (function() {
        var navLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        var storedLang = localStorage.getItem('storageWar_lang');
        var lang = storedLang || (navLang.startsWith('zh') ? 'zh' : 'en');
        var msg = document.querySelector('.notice-message');
        var hint = document.querySelector('.notice-hint');
        if (msg) msg.textContent = lang === 'en'
          ? 'Please open this page on a desktop browser'
          : '请使用电脑浏览器打开此页面';
        if (hint) hint.textContent = lang === 'en'
          ? 'This game requires keyboard & mouse, mobile is not supported'
          : '本游戏需要键盘和鼠标操作，不支持移动端';
      })();
    </script>
    <div id="menu-btn">☰</div>
    <div id="menu-popup">
      <div class="menu-item" data-action="sound">
        <span class="label" id="sound-label">Sound</span>
        <span class="val" id="sound-val">ON</span>
      </div>
      <div class="menu-item" data-action="lang">
        <span class="label" id="lang-label">Lang</span>
        <span class="val" id="lang-val">EN</span>
      </div>
      <div class="menu-item" data-action="mint">
        <span class="label" id="mint-label">铸造 Filpunks NFT</span>
        <span class="val">↗</span>
      </div>
    </div>
    <div id="wallet-btn">Connect</div>
    <div id="donate-area">
      <span id="donate-text"></span><button id="copy-btn">⎘</button>
    </div>
    <div id="version-label">version 1.3</div>
    <div id="toast"></div>
    <div id="menu-mint-overlay"></div>
    <div id="upgrade-overlay">
      <div id="upgrade-title">⭐ 升级！选择一个技能 ⭐</div>
      <div id="upgrade-choices"></div>
    </div>
  </div>

  <!-- 移动端检测 -->
  <script>
    (function() {
      var ua = navigator.userAgent || '';
      var isMobileUA = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini|Windows Phone/i.test(ua);
      var isSmallScreen = window.innerWidth < 1024 || window.innerHeight < 600;
      var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      if (isMobileUA || (isSmallScreen && isTouch)) {
        document.body.classList.add('is-mobile');
        window.__IS_MOBILE = true;
      }
    })();
  </script>

  <!-- ethers.js for wallet integration -->
  <script src="https://unpkg.com/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <!-- 游戏模块，按依赖顺序加载 -->
  <script type="module" src="js/main.js?v=14"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PHMMFRZV9B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-PHMMFRZV9B');
  </script>
</body>
</html>
